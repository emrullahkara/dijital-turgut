<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UMUT POLYESTER - İş Yönetimi</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0fdf4; }
        .card { padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; color: white; }
        .musteri-color { background: #dbeafe; border-left: 6px solid #2563eb; }
    </style>
</head>
<body>

<div class="tab-box">
    <button class="nav-btn" style="background:#059669" onclick="location.reload()">Ana Menü</button>
</div>

<!-- Müşteri Detay Ekranı -->
<div id="detay-ekran" class="card musteri-color">
    <h2 id="detay-isim">Müşteri İsmi</h2>
    <p>Güncel Bakiye: <b id="detay-bakiye">0 TL</b></p>
    <hr>
    <button onclick="islemEkle('borc')" style="background:#dc2626; color:white; border:none; padding:10px; border-radius:5px;">Borç Ekle</button>
    <button onclick="islemEkle('tahsilat')" style="background:#059669; color:white; border:none; padding:10px; border-radius:5px;">Tahsilat Ekle</button>
    <div id="hareket-listesi" style="margin-top:20px;"></div>
</div>

<script>
    // URL'den seçilen müşteri indeksini alalım (veya basitleştirelim)
    let seciliIndex = localStorage.getItem('seciliIndex');
    let musteriler = JSON.parse(localStorage.getItem('musteriler')) || [];
    let musteri = musteriler[seciliIndex];

    document.getElementById('detay-isim').innerText = musteri.isim;
    document.getElementById('detay-bakiye').innerText = musteri.bakiye + " TL";

    function islemEkle(tur) {
        let tutar = prompt(tur === 'borc' ? "Borç tutarını girin:" : "Tahsilat tutarını girin:");
        if (tutar) {
            tutar = parseFloat(tutar);
            if (tur === 'borc') musteri.bakiye += tutar;
            else musteri.bakiye -= tutar;
            
            musteriler[seciliIndex] = musteri;
            localStorage.setItem('musteriler', JSON.stringify(musteriler));
            location.reload();
        }
    }
</script>
</body>
</html>
