<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dijital Turgut</title>
    <style>
        :root { --primary: #059669; --bg-overlay: rgba(255, 255, 255, 0.9); }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 15px; 
            background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
        }
        .card { background: var(--bg-overlay); padding: 20px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        h2 { text-align: center; color: #064e3b; margin-top: 0; }
        .form-control { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #374151; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; box-sizing: border-box; background: rgba(255,255,255,0.7); }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .list-item { border-bottom: 1px solid #d1d5db; padding: 10px 0; display: flex; justify-content: space-between; font-size: 14px; color: #111827; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dijital Turgut</h2>
    <div class="form-control">
        <label>Ürün Seçimi</label>
        <select id="urun" onchange="toggleInputs()">
            <option value="1500" data-tip="adet">Kapı Kasası (1500 TL)</option>
            <option value="1500" data-tip="adet">Kapı Kanadı (1500 TL)</option>
            <option value="2750" data-tip="adet">Kapı Kasa+Kanat (2750 TL)</option>
            <option value="1500" data-tip="m2">Tek Yön Düz Mat (1500 TL/m2)</option>
            <option value="1750" data-tip="m2">Tek Yön Çıtalı Mat (1750 TL/m2)</option>
            <option value="3000" data-tip="m2">Tek Yön Düz Parlak (3000 TL/m2)</option>
            <option value="3500" data-tip="m2">Tek Yön Çıtalı Parlak (3500 TL/m2)</option>
            <option value="800" data-tip="adet">Sandalye Basit (800 TL)</option>
            <option value="1250" data-tip="adet">Sandalye İşçilikli (1250 TL)</option>
        </select>
    </div>
    
    <div id="ebat-alan" class="form-control" style="display:none;">
        <label>En x Boy (cm)</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="en" placeholder="En">
            <input type="number" id="boy" placeholder="Boy">
        </div>
    </div>

    <div class="form-control">
        <label>Adet</label>
        <input type="number" id="adet" value="1">
    </div>
    
    <button onclick="hesapla()">Listeye Ekle</button>
</div>

<div class="card" style="margin-top: 20px;">
    <div id="liste"></div>
    <div id="toplam" style="margin-top: 15px; font-weight: bold; text-align: right; font-size: 18px; color: var(--primary);"></div>
</div>

<script>
    let veriler = [];

    function toggleInputs() {
        const urun = document.getElementById('urun');
        const tip = urun.options[urun.selectedIndex].dataset.tip;
        document.getElementById('ebat-alan').style.display = (tip === 'm2') ? 'block' : 'none';
    }

    function hesapla() {
        const urunEl = document.getElementById('urun');
        const tip = urunEl.options[urunEl.selectedIndex].dataset.tip;
        const en = parseFloat(document.getElementById('en').value) || 0;
        const boy = parseFloat(document.getElementById('boy').value) || 0;
        const adet = parseInt(document.getElementById('adet').value) || 1;
        const fiyatBirim = parseFloat(urunEl.value);

        let m2 = (tip === 'm2') ? (en * boy) / 10000 : 0;
        let fiyat = (tip === 'm2') ? (m2 * fiyatBirim * adet) : (fiyatBirim * adet);

        veriler.push({urun: urunEl.options[urunEl.selectedIndex].text, fiyat: fiyat});
        render();
    }

    function render() {
        const liste = document.getElementById('liste');
        liste.innerHTML = '';
        let tFiyat = 0;
        veriler.forEach(v => {
            liste.innerHTML += `<div class="list-item"><span>${v.urun}</span><span>${v.fiyat.toLocaleString()} TL</span></div>`;
            tFiyat += v.fiyat;
        });
        document.getElementById('toplam').innerText = `Toplam: ${tFiyat.toLocaleString()} TL`;
    }
</script>
</body>
</html>
