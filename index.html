<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UMUT POLYESTER - İş Yönetimi</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0fdf4; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .tab-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; color: white; }
        .item-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="tab-box">
    <button class="nav-btn" style="background:#059669" onclick="show('teklif')">Teklif</button>
    <button class="nav-btn" style="background:#2563eb" onclick="show('musteri')">Müşteriler</button>
    <button class="nav-btn" style="background:#ea580c" onclick="show('borc')">Borçlar</button>
</div>

<!-- 1. TEKLİF -->
<div id="teklif" class="card">
    <h2>Teklif Hazırlama</h2>
    <select id="urun" onchange="toggleInputs()"></select>
    <div id="ebat-alan" style="display:none; margin-top:10px;">
        <input type="number" id="en" placeholder="En (cm)">
        <input type="number" id="boy" placeholder="Boy (cm)">
    </div>
    <input type="number" id="adet" value="1" style="margin:10px 0;">
    <button onclick="listeyeEkle()" style="background:#059669; color:white; border:none; padding:10px; width:100%; border-radius:8px;">Listeye Ekle</button>
    <div id="liste" style="margin-top:10px;"></div>
    <div id="toplam" style="font-weight:bold; margin-top:10px;">Toplam: 0 TL</div>
</div>

<!-- 2. MÜŞTERİLER -->
<div id="musteri" class="card" style="display:none;">
    <h2>Müşterilerim</h2>
    <button onclick="yeniMusteriEkle()" style="background:#2563eb; color:white; border:none; padding:10px; width:100%; border-radius:8px;">+ Müşteri Ekle</button>
    <div id="musteri-listesi" style="margin-top:15px;"></div>
</div>

<!-- 3. BORÇLAR -->
<div id="borc" class="card" style="display:none;">
    <h2>Gider / Borç Listesi</h2>
    <button onclick="borcEkle()" style="background:#ea580c; color:white; border:none; padding:10px; width:100%; border-radius:8px;">+ Borç Ekle</button>
    <div id="borc-listesi" style="margin-top:15px;"></div>
</div>

<script>
    // Ortak Veri Yönetimi
    let veriler = JSON.parse(localStorage.getItem('umutData')) || { musteriler: [], borclar: [], urunler: [{ad: "Kapı Kasası", fiyat: 1500, tip: "adet"}, {ad: "Tek Yön Düz Mat", fiyat: 1500, tip: "m2"}] };

    function show(id) {
        document.getElementById('teklif').style.display = (id === 'teklif') ? 'block' : 'none';
        document.getElementById('musteri').style.display = (id === 'musteri') ? 'block' : 'none';
        document.getElementById('borc').style.display = (id === 'borc') ? 'block' : 'none';
    }

    // TEKLİF MANTIĞI
    function urunleriYukle() {
        const select = document.getElementById('urun');
        select.innerHTML = veriler.urunler.map((u, i) => `<option value="${i}">${u.ad} (${u.fiyat} TL)</option>`).join('');
    }

    function toggleInputs() {
        const u = veriler.urunler[document.getElementById('urun').value];
        document.getElementById('ebat-alan').style.display = (u.tip === 'm2') ? 'block' : 'none';
    }

    function listeyeEkle() {
        const u = veriler.urunler[document.getElementById('urun').value];
        const en = parseFloat(document.getElementById('en').value) || 0;
        const boy = parseFloat(document.getElementById('boy').value) || 0;
        const adet = parseInt(document.getElementById('adet').value) || 1;
        let fiyat = (u.tip === 'm2') ? (((en * boy) / 10000) * u.fiyat * adet) : (u.fiyat * adet);
        document.getElementById('liste').innerHTML += `<div class="item-row"><span>${u.ad}</span><span>${fiyat.toLocaleString()} TL</span></div>`;
    }

    // MÜŞTERİ VE BORÇ MANTIĞI
    function yeniMusteriEkle() {
        let isim = prompt("Müşteri ismi:");
        if (isim) { veriler.musteriler.push({isim, bakiye: 0}); localStorage.setItem('umutData', JSON.stringify(veriler)); location.reload(); }
    }

    function borcEkle() {
        let aciklama = prompt("Gider açıklaması:");
        let tutar = parseFloat(prompt("Tutar:"));
        if (aciklama && tutar) { veriler.borclar.push({aciklama, tutar, tarih: new Date().toLocaleDateString()}); localStorage.setItem('umutData', JSON.stringify(veriler)); location.reload(); }
    }

    // BAŞLAT
    function init() {
        urunleriYukle();
        document.getElementById('borc-listesi').innerHTML = veriler.borclar.map(b => `<div class="item-row"><span>${b.aciklama} (${b.tarih})</span><span>${b.tutar.toLocaleString()} TL</span></div>`).join('');
        document.getElementById('musteri-listesi').innerHTML = veriler.musteriler.map(m => `<div class="item-row"><span>${m.isim}</span><span>0 TL</span></div>`).join('');
    }
    init();
</script>
</body>
</html>
