<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Turgut - Yönetim</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0fdf4; }
        .card { padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-teklif { background-color: #dcfce7; border-left: 5px solid #059669; }
        .tab-musteri { background-color: #dbeafe; border-left: 5px solid #2563eb; }
        .tab-gider { background-color: #ffedd5; border-left: 5px solid #ea580c; }
        .nav-btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; margin: 2px; }
    </style>
</head>
<body>

<!-- Sekme Menüsü -->
<div style="display:flex; margin-bottom: 20px;">
    <button class="nav-btn" onclick="openTab('teklif')">Teklif</button>
    <button class="nav-btn" onclick="openTab('musteri')">Müşteriler</button>
    <button class="nav-btn" onclick="openTab('gider')">Giderler</button>
</div>

<!-- 1. Teklif Ekranı -->
<div id="teklif" class="card tab-teklif">
    <h2>Teklif Hazırlama</h2>
    <p>Burada eskisi gibi hesaplama yapabilirsin.</p>
</div>

<!-- 2. Müşteri Ekranı -->
<div id="musteri" class="card tab-musteri" style="display:none;">
    <h2>Müşterilerim</h2>
    <button onclick="alert('Müşteri ekleme özelliği yakında gelecek')">+ Müşteri Ekle</button>
</div>

<!-- 3. Giderler Ekranı -->
<div id="gider" class="card tab-gider" style="display:none;">
    <h2>Gider ve Borçlar</h2>
    <p>Kira ve borçlarını buradan takip edeceksin.</p>
</div>

<script>
    function openTab(tabName) {
        document.getElementById('teklif').style.display = (tabName === 'teklif') ? 'block' : 'none';
        document.getElementById('musteri').style.display = (tabName === 'musteri') ? 'block' : 'none';
        document.getElementById('gider').style.display = (tabName === 'gider') ? 'block' : 'none';
    }
</script>
</body>
</html>
