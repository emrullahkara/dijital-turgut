<!-- Sekme Menüsü -->
<div class="card" style="display:flex; justify-content: space-around;">
    <button onclick="showTab('teklif')">Teklif</button>
    <button onclick="showTab('musteri')">Müşteriler</button>
    <button onclick="showTab('borclar')">Borçlarım</button>
</div>

<!-- Sekme İçerikleri -->
<div id="teklif-tab"> ... (Eski hesap makinen buraya gelecek) ... </div>
<div id="musteri-tab" style="display:none;"> ... (Müşteri listesi buraya gelecek) ... </div>
<div id="borclar-tab" style="display:none;"> ... (Borçlu olduğumuz yerler buraya gelecek) ... </div>

<script>
    function showTab(tab) {
        document.getElementById('teklif-tab').style.display = (tab === 'teklif') ? 'block' : 'none';
        document.getElementById('musteri-tab').style.display = (tab === 'musteri') ? 'block' : 'none';
        document.getElementById('borclar-tab').style.display = (tab === 'borclar') ? 'block' : 'none';
    }
</script>
