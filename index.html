<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Turgut - Yönetim</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0fdf4; }
        .tab-box { display: flex; gap: 5px; margin-bottom: 20px; }
        .nav-btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; color: white; }
        .card { padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .teklif-color { background: #dcfce7; border-left: 6px solid #059669; }
        .musteri-color { background: #dbeafe; border-left: 6px solid #2563eb; }
        .borc-color { background: #ffedd5; border-left: 6px solid #ea580c; }
    </style>
</head>
<body>

<div class="tab-box">
    <button class="nav-btn" style="background:#059669" onclick="show('teklif')">Teklif</button>
    <button class="nav-btn" style="background:#2563eb" onclick="show('musteri')">Müşteriler</button>
    <button class="nav-btn" style="background:#ea580c" onclick="show('borc')">Borçlarım</button>
</div>

<div id="teklif" class="card teklif-color"><h2>Teklif Hazırlama</h2><p>Hesaplamalar burada...</p></div>
<div id="musteri" class="card musteri-color" style="display:none;"><h2>Müşterilerim</h2><p>Müşteri kartları burada...</p></div>
<div id="borc" class="card borc-color" style="display:none;"><h2>Borçlarım</h2><p>Gider ve kira takibi burada...</p></div>

<script>
    function show(id) {
        document.getElementById('teklif').style.display = (id === 'teklif') ? 'block' : 'none';
        document.getElementById('musteri').style.display = (id === 'musteri') ? 'block' : 'none';
        document.getElementById('borc').style.display = (id === 'borc') ? 'block' : 'none';
    }
</script>
</body>
</html>
