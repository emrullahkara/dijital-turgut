<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İş Takip Uygulaması</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .tabs { margin-bottom: 20px; }
        .tab-content { display: none; background: white; padding: 20px; border-radius: 8px; }
        .active { display: block; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; }
        input, select { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .borc { color: red; } .tahsilat { color: green; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="tabs">
    <button onclick="showTab('teklif')">Teklif</button>
    <button onclick="showTab('musteri')">Müşteriler</button>
    <button onclick="showTab('borclar')">Borçlar</button>
</div>

<!-- TEKLİF SEKMESİ -->
<div id="teklif" class="tab-content active">
    <h3>Teklif Hazırlama</h3>
    <select id="urunSec"></select>
    <input type="number" id="en" placeholder="En (cm)">
    <input type="number" id="boy" placeholder="Boy (cm)">
    <input type="number" id="adet" placeholder="Adet">
    <button onclick="urunEkle()">Listeye Ekle</button>
    <ul id="teklifListesi"></ul>
    <button onclick="disaAktar('teklif')">Teklifi İndir</button>
</div>

<!-- MÜŞTERİ SEKMESİ -->
<div id="musteri" class="tab-content">
    <h3>Müşteri Ekle</h3>
    <input type="text" id="yeniMusteriAd" placeholder="Ad Soyad">
    <button onclick="musteriEkle()">Müşteri Ekle</button>
    <div id="musteriListesi"></div>
</div>

<!-- BORÇLAR SEKMESİ -->
<div id="borclar" class="tab-content">
    <h3>Borç / Gider Takibi</h3>
    <input type="text" id="kimeBorc" placeholder="Kime borçlu">
    <input type="number" id="tutarBorc" placeholder="Tutar">
    <button onclick="kisiselBorcEkle()">Kaydet</button>
    <table id="kisiselBorcTablo"></table>
</div>

<script>
    // Ürün Tanımları
    const urunler = {
        "Tek Yön Düz Mat": 1750, "Tek Yön Çıtalı Mat": 2000, 
        "Tek Yön Düz Parlak": 3000, "Tek Yön Çıtalı Parlak": 3500,
        "Kapı Kasası": 1500, "Kapı Kanadı": 1500, "Kapı Kasa+Kanat": 2750
    };

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function urunEkle() {
        let secilen = document.getElementById('urunSec').value;
        let adet = document.getElementById('adet').value;
        let fiyat = urunler[secilen];
        let m2 = (document.getElementById('en').value * document.getElementById('boy').value) / 10000;
        let tutar = (m2 > 0) ? (m2 * fiyat * adet) : (fiyat * adet);
        
        let li = document.createElement('li');
        li.textContent = `${secilen} - ${tutar} TL`;
        document.getElementById('teklifListesi').appendChild(li);
    }

    function musteriEkle() {
        let ad = document.getElementById('yeniMusteriAd').value;
        // Basit veri yönetimi: Müşteri nesnesi oluşturup localStorage'a atılacak
        alert(ad + " eklendi (Veri yapısı kuruldu)");
    }

    function kisiselBorcEkle() {
        let kime = document.getElementById('kimeBorc').value;
        let tutar = document.getElementById('tutarBorc').value;
        // Buraya borç ekleme mantığı gelecek
        alert(kime + " için " + tutar + " TL borç eklendi.");
    }

    function disaAktar(tur) {
        alert(tur + " dosyası indiriliyor...");
    }

    // Başlangıçta ürünleri yükle
    let select = document.getElementById('urunSec');
    for (let u in urunler) {
        let opt = document.createElement('option');
        opt.value = u; opt.innerHTML = u;
        select.appendChild(opt);
    }
</script>
</body>
</html>
