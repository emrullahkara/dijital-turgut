<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>UMUT POLYESTER - Yönetim</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0fdf4; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; width: 100%; margin-top: 5px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>

<div style="display:flex; gap:5px;">
    <button class="btn" style="background:#059669" onclick="goster('teklif')">Teklif</button>
    <button class="btn" style="background:#2563eb" onclick="goster('musteri')">Müşteriler</button>
    <button class="btn" style="background:#ea580c" onclick="goster('borc')">Borçlar</button>
</div>

<!-- TEKLİF SEKMESİ -->
<div id="teklif" class="card">
    <h3>Ürün Yönetimi</h3>
    <input id="uAd" placeholder="Ürün Adı">
    <input id="uFiyat" type="number" placeholder="Fiyat">
    <select id="uTip"><option value="adet">Adet</option><option value="m2">m2</option></select>
    <button class="btn" style="background:#064e3b" onclick="urunEkle()">Ürün Ekle</button>
    <hr>
    <select id="urunSec"></select>
    <button class="btn" style="background:#059669" onclick="teklifHesapla()">Listeye Ekle</button>
    <div id="liste"></div>
</div>

<!-- MÜŞTERİ SEKMESİ -->
<div id="musteri" class="card" style="display:none;">
    <h3>Müşteriler</h3>
    <input id="mAd" placeholder="Müşteri Adı">
    <button class="btn" style="background:#2563eb" onclick="musteriEkle()">Müşteri Ekle</button>
    <div id="mListe"></div>
</div>

<!-- BORÇ SEKMESİ -->
<div id="borc" class="card" style="display:none;">
    <h3>Gider / Borç</h3>
    <input id="bAcik" placeholder="Açıklama">
    <input id="bTutar" type="number" placeholder="Tutar">
    <button class="btn" style="background:#ea580c" onclick="borcEkle()">Borç Ekle</button>
    <div id="bListe"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('umutData')) || {m:[], b:[], u:[{ad:"Kapı Kasası",f:1500,t:"adet"}], t:[]};

    function goster(id) {
        document.getElementById('teklif').style.display = id=='teklif'?'block':'none';
        document.getElementById('musteri').style.display = id=='musteri'?'block':'none';
        document.getElementById('borc').style.display = id=='borc'?'block':'none';
    }

    function urunEkle() {
        db.u.push({ad:document.getElementById('uAd').value, f:parseFloat(document.getElementById('uFiyat').value), t:document.getElementById('uTip').value});
        kaydet();
    }
    function musteriEkle() {
        db.m.push({ad:document.getElementById('mAd').value});
        kaydet();
    }
    function borcEkle() {
        db.b.push({a:document.getElementById('bAcik').value, t:document.getElementById('bTutar').value});
        kaydet();
    }
    function kaydet() { localStorage.setItem('umutData', JSON.stringify(db)); location.reload(); }

    // Listeleri çiz
    db.u.forEach(i => document.getElementById('urunSec').innerHTML += `<option>${i.ad} (${i.f} TL)</option>`);
    db.m.forEach(i => document.getElementById('mListe').innerHTML += `<div class="row">${i.ad}</div>`);
    db.b.forEach((i, idx) => document.getElementById('bListe').innerHTML += `<div class="row">${i.a} - ${i.t} TL <span onclick="db.b.splice(${idx},1); kaydet()" style="cursor:pointer">❌</span></div>`);
</script>
</body>
</html>
